name: learningmpc

services:
  sim:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Optional: drop this block if you don't need GPU-accelerated rviz2
    # rendering (rviz2 falls back to software rendering without it).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["ros2", "launch", "f1tenth_gym_ros", "gym_bridge_launch.py"]

  lmpc:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
    # No track_name override -- lmpc.launch.py's own default is
    # gold_conference_room. For a different track: `run --rm lmpc ros2
    # launch lmpc_ros2 lmpc.launch.py track_name:=... track_dir:=...`
    # (README.md Section 4).
    #
    # Bind-mounted so this container sees the initial_safe_set.csv the
    # `seed` service (below) writes -- without this, `seed` and `lmpc` are
    # separate --rm containers from the same image and never share a
    # filesystem, so `seed`'s write would otherwise vanish before `lmpc`
    # could read it.
    #
    # Mounted onto the INSTALL share dir, not the source tree: the launch
    # files resolve track_dir via get_package_share_directory("lmpc_ros2"),
    # which entrypoint.sh's `source /ws/install/setup.bash` points at
    # /ws/install/lmpc_ros2/share/lmpc_ros2 -- not /ws/src/.../lmpc_ros2.
    # CMakeLists.txt's `install(DIRECTORY ... data ...)` is a plain (non
    # --symlink-install) copy, so mounting over the source path is inert --
    # neither node ever reads or writes there.
    volumes:
      - ../data:/ws/install/lmpc_ros2/share/lmpc_ros2/data
    command: ["ros2", "launch", "lmpc_ros2", "lmpc.launch.py"]

  # Generates a fresh initial safe set (README.md Section 3) -- NOT started
  # by plain `up`: it drives the car itself and would fight `lmpc` for
  # /drive if it launched automatically alongside it every time. Opt-in via
  # the "seed" profile:
  #   docker compose -f lmpc_ros2/docker/docker-compose.yml --profile seed run --rm seed
  # Same no-override reasoning as `lmpc` above -- pure_pursuit.launch.py's
  # own default is gold_conference_room, which has no bundled safe set (only
  # a centerline) -- this MUST be run at least once before `lmpc` (above)
  # can start against the default track.
  seed:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
    profiles: ["seed"]
    # Bind-mounted for the same reason as `lmpc` above -- this is the write
    # side: without it, the CSV this writes is lost the moment the
    # container exits (`run --rm`), never reaching `lmpc`'s container. Same
    # install-vs-source path note as `lmpc` above applies here too.
    volumes:
      - ../data:/ws/install/lmpc_ros2/share/lmpc_ros2/data
    command: ["ros2", "launch", "lmpc_ros2", "pure_pursuit.launch.py"]
