name: learningmpc

services:
  sim:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Optional: drop this block if you don't need GPU-accelerated rviz2
    # rendering (rviz2 falls back to software rendering without it).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["ros2", "launch", "f1tenth_gym_ros", "gym_bridge_launch.py"]

  lmpc:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
    # No track_name override -- lmpc.launch.py's own default is barc_oval.
    # For a different track: `run --rm lmpc ros2 launch lmpc_ros2
    # lmpc.launch.py track_name:=... track_dir:=...` (README.md Section 4).
    command: ["ros2", "launch", "lmpc_ros2", "lmpc.launch.py"]

  # Generates a fresh initial safe set (README.md Section 3) -- NOT started
  # by plain `up`: it drives the car itself and would fight `lmpc` for
  # /drive if it launched automatically alongside it every time. Opt-in via
  # the "seed" profile:
  #   docker compose -f lmpc_ros2/docker/docker-compose.yml --profile seed run --rm seed
  # Same no-override reasoning as `lmpc` above -- pure_pursuit.launch.py's
  # own default is barc_oval, whose data/max_speed are bundled/set already.
  seed:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
    profiles: ["seed"]
    command: ["ros2", "launch", "lmpc_ros2", "pure_pursuit.launch.py"]
