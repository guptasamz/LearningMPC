name: learningmpc

services:
  sim:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Optional: drop this block if you don't need GPU-accelerated rviz2
    # rendering (rviz2 falls back to software rendering without it).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["ros2", "launch", "f1tenth_gym_ros", "gym_bridge_launch.py"]

  # Real particle filter (vendored at third_party/syn_pf_cpp, same
  # source that runs on the real car -- see UPSTREAMS.md's ForzaETH/
  # particle_filter entry there) running against gym_bridge's SIMULATED
  # lidar/map/odom, publishing a genuinely PF-estimated /tracked_pose. This
  # is what lets `lmpc` (below) run with pose_source:=pf by default in sim --
  # exercising the exact same state-reconstruction path (lmpc_node's
  # reconstruct_from_pf()) the real car uses, not sim ground truth. Same
  # pattern as f1tenth_ws's own run_verify_real_in_sim.sh.
  pf:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
    command: ["ros2", "launch", "syn_pf_cpp", "synpf_cpp_launch.py"]

  lmpc:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
      - pf
    # No track_name override -- lmpc.launch.py's own default is
    # gold_conference_room. For a different track: `run --rm lmpc ros2
    # launch lmpc_ros2 lmpc.launch.py track_name:=... track_dir:=...`
    # (README.md Section 4).
    #
    # Bind-mounted so this container sees the initial_safe_set.csv the
    # `seed` service (below) writes -- without this, `seed` and `lmpc` are
    # separate --rm containers from the same image and never share a
    # filesystem, so `seed`'s write would otherwise vanish before `lmpc`
    # could read it.
    #
    # Mounted onto the INSTALL share dir, not the source tree: the launch
    # files resolve track_dir via get_package_share_directory("lmpc_ros2"),
    # which entrypoint.sh's `source /ws/install/setup.bash` points at
    # /ws/install/lmpc_ros2/share/lmpc_ros2 -- not /ws/src/.../lmpc_ros2.
    # CMakeLists.txt's `install(DIRECTORY ... data ...)` is a plain (non
    # --symlink-install) copy, so mounting over the source path is inert --
    # neither node ever reads or writes there.
    volumes:
      - ../data:/ws/install/lmpc_ros2/share/lmpc_ros2/data
    # No track_half_width_max override -- gold_conference_room's centerline
    # csv now carries designed track widths (TUM-style x,y,w_tr_right,
    # w_tr_left), which LMPCCore::apply_csv_halfwidths caps the ray-marched
    # half-widths against (min of the two). That CSV cap is the authoritative
    # defense against a ray escaping through a doorway and reporting a
    # phantom-wide corridor -- narrowing track_half_width_max on top of it
    # would just needlessly under-cut legitimate width wherever the ray
    # search correctly finds nothing nearby. Kept at lmpc_params.yaml's
    # shared 0.8m default.
    #
    # pose_source:=pf -- sim now runs through the same state-reconstruction
    # path (x/y/yaw from the `pf` service's /tracked_pose, finite-diff
    # omega/beta) as the real car, instead of trusting gym_bridge's ground-
    # truth twist directly. pose_topic stays /ego_racecar/odom, now used only
    # for its |v|.
    command: ["ros2", "launch", "lmpc_ros2", "lmpc.launch.py",
              "pose_source:=pf", "pf_pose_topic:=/tracked_pose"]

  # Generates a fresh initial safe set (README.md Section 3) -- NOT started
  # by plain `up`: it drives the car itself and would fight `lmpc` for
  # /drive if it launched automatically alongside it every time. Opt-in via
  # the "seed" profile:
  #   docker compose -f lmpc_ros2/docker/docker-compose.yml --profile seed run --rm seed
  # Same no-override reasoning as `lmpc` above -- pure_pursuit.launch.py's
  # own default is gold_conference_room, which already ships a recorded
  # initial_safe_set.csv (README.md Section 2.1) -- only needed to
  # regenerate it, e.g. after editing the centerline.
  seed:
    build:
      context: ../..
      dockerfile: lmpc_ros2/docker/Dockerfile
    image: learningmpc-ros2:humble
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - sim
      - pf
    profiles: ["seed"]
    # Bind-mounted for the same reason as `lmpc` above -- this is the write
    # side: without it, the CSV this writes is lost the moment the
    # container exits (`run --rm`), never reaching `lmpc`'s container. Same
    # install-vs-source path note as `lmpc` above applies here too.
    volumes:
      - ../data:/ws/install/lmpc_ros2/share/lmpc_ros2/data
    # pose_source:=pf -- same reasoning as `lmpc` above: the recorded safe
    # set should reflect driving off the same PF-reconstructed state
    # (x/y/yaw from `pf`'s /tracked_pose, |v| from odom) the real car will
    # actually use, not sim ground truth.
    command: ["ros2", "launch", "lmpc_ros2", "pure_pursuit.launch.py",
              "pose_source:=pf", "pf_pose_topic:=/tracked_pose"]
