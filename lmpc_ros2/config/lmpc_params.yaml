# Self-contained config for the whole lmpc_ros2 process (both nodes) --
# everything lmpc_node and pure_pursuit_node need lives here, under
# lmpc_ros2/, not read from or written to anything outside this package.
#
# Controller tuning is transcribed from ../../Lmpc_params.yaml (see that
# file's comments for the reasoning behind each value, especially
# osqp_max_iter/osqp_time_limit) -- keep the two in sync by hand if you
# retune the ROS1/gym side too; they're intentionally two separate files,
# not one shared across the ROS1/gym and ROS2 boundary.
lmpc_node:
  ros__parameters:
    # N*Ts=1.25s horizon -- matches f1tenth_gym_jl's HORIZON_STEPS=50 at its
    # own dt=0.025 (same track, barc_oval). Larger QP than N=25 though --
    # re-verify the 25ms Ts budget once ROS2 is available to test with.
    N: 50.0
    Ts: 0.025
    K_NEAR: 16.0
    SPEED_MAX: 10.00
    # 0.4189 matches f1tenth_gym_jl's DELTA_MAX exactly (was 0.41).
    STEER_MAX: 0.4189
    ACCELERATION_MAX: 9.51
    DECELERATION_MAX: 9.51
    VEL_THRESHOLD: 0.8
    MAP_MARGIN: 0.2
    # Ceiling on the track half-width the controller believes it has
    # wherever Track::initialize_width()'s wall search can't find a wall
    # nearby. 0.8 is sized for wide purpose-built tracks (barc_oval) -- for
    # a track with genuinely narrow corridors (e.g. a real room scan like
    # gold_conference_room), override lower via lmpc.launch.py's
    # track_half_width_max argument (see docker-compose.yml), not here --
    # this default is shared across every track unless overridden per-run.
    track_half_width_max: 0.8
    WAYPOINT_SPACE: 0.3
    # Matches f1tenth_gym_jl's R_ACCEL/R_STEER for barc_oval at this same
    # N/Ts -- tuned as a set together with the horizon/timestep above, so
    # ported together rather than left at the old N=25/Ts=0.05-era values.
    r_accel: 18.0
    r_steer: 5.0
    r_d_accel: 0.1
    r_d_steer: 0.1
    q_s: 3000.0
    q_s_terminal: 800.0
    osqp_max_iter: 20000.0
    osqp_time_limit: 0.03
    wheelbase: 0.3302
    # Per DA_MCTS_new_implementation/params/vehicle_params.yaml (its own
    # header: "Field names match the f1tenth_gym expected param dict") --
    # same generic f110_gym simulator defaults f1tenth_gym_jl uses, not an
    # independent real-car measurement. Was: friction_coeff 1.2, C_S_front/
    # rear 2.3/2.3, height_cg 0.08255, mass 3.17, moment_inertia 0.0398378
    # (labeled in ../../Lmpc_params.yaml as actual measurements of car
    # "lidart").
    friction_coeff: 1.0489
    height_cg: 0.074
    l_cg2rear: 0.17145
    l_cg2front: 0.15875
    C_S_front: 4.718
    C_S_rear: 5.4562
    mass: 3.74
    moment_inertia: 0.04712
    # 0 = original known-dynamics model; 1 = kinematic nominal + online
    # residual regression (online_training/) -- see README.md.
    dynamics_model: 0.0
    # pose_source=pf only (see README.md Section 1): whether to estimate beta
    # (slip angle) at all. The estimate (finite-diff over PF pose samples,
    # then projected one step forward through this controller's own dynamics
    # model -- see lmpc_node.cpp's reconstruct_from_pf/predict_beta) is
    # noisier than the omega estimate next to it, since it differentiates a
    # discretely-sampled position signal rather than reading a rate directly.
    # false (default): pin beta to exactly 0 unconditionally instead. omega
    # is unaffected either way. Override per-run with lmpc.launch.py's
    # slip_angle_estimation:=<true|false>.
    slip_angle_estimation: false

pure_pursuit_node:
  ros__parameters:
    # Speed cap (m/s) while (re)generating a track's initial safe set
    # (README.md Section 3) -- required at the node level (throws if <= 0).
    # Keep this low, especially on the real car. Override for a one-off run
    # with pure_pursuit.launch.py's max_speed:=<value> launch argument.
    max_speed: 1.0
    # Matches lmpc_node's Ts above -- the recorded safe set's row spacing
    # must equal lmpc_node's Ts, or LMPCCore's per-step dynamics assumptions
    # (each row exactly Ts apart) are wrong. Re-run the seed step after
    # changing either value.
    control_dt: 0.025
