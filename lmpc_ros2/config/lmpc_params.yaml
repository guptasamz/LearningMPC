# Transcribed from ../../Lmpc_params.yaml (see that file for the reasoning
# behind each value, especially osqp_max_iter/osqp_time_limit's comments).
# waypoint_csv / init_safe_set_csv / reg_warmstart_csv are intentionally NOT
# set here -- they're install-location-dependent paths, resolved and passed
# by launch/lmpc.launch.py via ament_index_cpp's package share directory.
lmpc_node:
  ros__parameters:
    # -- topics: defaults match f1tenth_gym_ros's ego-agent convention.
    # Override pose_topic (e.g. to the real particle filter's output topic)
    # via launch argument when moving to the real car -- see README.md.
    pose_topic: "/ego_racecar/odom"
    drive_topic: "/drive"
    map_topic: "/map"

    # -- controller (verbatim from Lmpc_params.yaml) --
    N: 25
    Ts: 0.05
    K_NEAR: 16
    SPEED_MAX: 10.00
    STEER_MAX: 0.41
    ACCELERATION_MAX: 9.51
    DECELERATION_MAX: 9.51
    VEL_THRESHOLD: 0.8
    MAP_MARGIN: 0.45
    WAYPOINT_SPACE: 0.2
    r_accel: 1.5
    r_steer: 18.0
    r_d_accel: 0.1
    r_d_steer: 0.1
    q_s: 3000.0
    q_s_terminal: 800.0
    osqp_max_iter: 20000
    osqp_time_limit: 0.03
    wheelbase: 0.3302
    friction_coeff: 1.2
    height_cg: 0.08255
    l_cg2rear: 0.17145
    l_cg2front: 0.15875
    C_S_front: 2.3
    C_S_rear: 2.3
    mass: 3.17
    moment_inertia: 0.0398378
    # 0 = original known-dynamics model; 1 = kinematic nominal + online
    # residual regression (online_training/) -- see README.md.
    dynamics_model: 0

    # -- output clamp for the open-loop accel->speed integration --
    v_min: -5.0
    v_max: 20.0
