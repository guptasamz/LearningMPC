synpf_cpp:
  ros__parameters:
    # Topics / frames — real car
    pose_pub_topic: '/tracked_pose'
    scan_topic: '/scan'
    odometry_topic: '/odom'
    base_frame: 'base_link'
    odom_frame: 'odom'

    # Particles
    max_particles: 3000
    max_viz_particles: 50
    update_rate_hz: 50.0
    trigger_on_scan: true   # event-driven: run MCL on each new LiDAR scan (timer disabled)
    des_lidar_beams: 21
    lidar_aspect_ratio: 3.5

    # Lidar (UST-10LX ~10 m)
    max_range: 10.0
    range_method: 'rmgpu'
    theta_discretization: 150
    squash_factor: 2.2

    # Init — global scatter (set use_initial_pose=true if you know start pose)
    use_initial_pose: false
    initial_var_x: 0.5
    initial_var_y: 0.5
    initial_var_theta: 0.4
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_theta: 0.0

    # Sensor model
    z_hit: 0.85
    z_short: 0.10
    z_max: 0.025
    z_rand: 0.025
    sigma_hit: 0.1
    lambda_short: 0.25

    # Motion model (TUM)
    alpha_1_tum: 0.5
    alpha_2_tum: 0.015
    alpha_3_tum: 1.0
    alpha_4_tum: 0.1
    lam_thresh: 0.1

    # Laser→base offset (m). F1TENTH stock geometry.
    laser_offset_x: 0.275
    laser_offset_y: 0.0

    # Output
    viz: true
    publish_tf: true
    resample_method: 'systematic'
    rng_seed: 12345
