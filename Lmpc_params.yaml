pose_topic : "odom"
drive_topic: "nav"
wp_file_name: "/home/yuwei/yuwei_ws/src/LearningMPC/data/centerline_waypoints.csv"

r_accel : 1.5
r_steer: 18.0
# control-rate cost, RATE units: R_d*||(u_k - u_{k-1})/Ts||^2 (the 1/Ts^2 is
# folded in by lmpc_core). Values are directly comparable to the c_du figures
# of Xue et al. 2309.10716 (their BARC config: 0.1). Only read by the src_gym
# port, ignored by the original ROS node. 0 = off.
r_d_accel: 0.1
r_d_steer: 0.1
# OSQP iteration cap (src_gym port only). Default 4000 is too low for the
# large F1 maps (~500 m tracks, coords to +-75 m): QPs converge but slowly,
# and the aborted solves were reported as failures. Replay-verified: 20000
# takes YasMarina from 102 failures to 0.
osqp_max_iter: 20000
q_s: 3000.0
q_s_terminal: 800

N: 25
Ts: 0.05
K_NEAR: 16
SPEED_MAX: 10.00
STEER_MAX: 0.41
ACCELERATION_MAX: 9.51
DECELERATION_MAX: 9.51
VEL_THRESHOLD: 0.8

MAP_MARGIN: 0.45  # was 0.32; raised for f1tenth_gym runs after outer-wall crash ~lap 27 (see src_gym/results)

WAYPOINT_SPACE: 0.2

wheelbase: 0.3302 # meters
friction_coeff: 1.2 # - (complete estimate)
height_cg: 0.08255 # m (roughly measured to be 3.25 in)
l_cg2rear: 0.17145 # m (decently measured to be 6.75 in)
l_cg2front: 0.15875 # m (decently measured to be 6.25 in)
C_S_front: 2.3 #.79 # 1/rad ? (estimated weight/4)
